version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - err113
    - errorlint
    - gocritic
    - gosec
    - ineffassign
    - noctx
    - prealloc
    - revive
    - unconvert

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: package-comments
